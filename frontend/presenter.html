<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter Controls — Live Poll</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">Presenter Controls</h1>
            <p class="site-subtitle">ADA Sheffield — Poll Visibility Manager</p>
        </div>
    </header>

    <main class="container">
        <div id="error-banner" class="error-banner hidden" role="alert" aria-live="polite"></div>
        <div id="access-denied" class="access-denied hidden">
            <p>Access denied — please provide the secret key as a URL parameter.</p>
            <p class="access-denied-hint">Example: <code>presenter.html?key=your-secret-key</code></p>
        </div>
        <section id="polls-container" class="polls-list" aria-label="Poll controls"></section>
        <div id="empty-state" class="empty-state hidden">
            <p>No polls found.</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 ADA Sheffield &middot; Cloud Computing L100</p>
        </div>
    </footer>

    <script src="presenter.js"></script>
</body>
</html>
